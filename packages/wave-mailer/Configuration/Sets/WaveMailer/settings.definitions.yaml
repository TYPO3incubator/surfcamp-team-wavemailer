categories:
  WaveMailer:
    label: 'Wave Mailer'
  WaveMailer.pages:
    label: 'Pages'
    parent: WaveMailer

settings:
  waveMailer.includeCSS:
    label: 'Include CSS'
    type: bool
    category: WaveMailer
    description: 'Include the default CSS of wave-mailer'
    default: true

  waveMailer.confirmationPage:
    label: 'Confirmation page'
    type: page
    category: WaveMailer.pages
    description: 'Page to redirect after a successful registration'
    default: 0

  waveMailer.storagePid:
    label: 'Storage page'
    type: page
    category: WaveMailer.pages
    description: 'Page to store new subscribers'
    default: 0

