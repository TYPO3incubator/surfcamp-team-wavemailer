<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:if condition="{header}">
    <f:switch expression="{layout}">
        <f:case value="1">
            <h1 style="margin:0 0 12px 0;font-family:Arial,Helvetica,sans-serif;font-size:32px;font-weight:700;line-height:1.2;color:#1a1a1a;">
                {header}
            </h1>
        </f:case>
        <f:case value="2">
            <h2 style="margin:0 0 12px 0;font-family:Arial,Helvetica,sans-serif;font-size:26px;font-weight:700;line-height:1.2;color:#1a1a1a;">
                {header}
            </h2>
        </f:case>
        <f:case value="3">
            <h3 style="margin:0 0 12px 0;font-family:Arial,Helvetica,sans-serif;font-size:22px;font-weight:700;line-height:1.2;color:#1a1a1a;">
                {header}
            </h3>
        </f:case>
        <f:case value="4">
            <h4 style="margin:0 0 12px 0;font-family:Arial,Helvetica,sans-serif;font-size:18px;font-weight:700;line-height:1.2;color:#1a1a1a;">
                {header}
            </h4>
        </f:case>
        <f:case value="5">
            <h5 style="margin:0 0 12px 0;font-family:Arial,Helvetica,sans-serif;font-size:16px;font-weight:700;line-height:1.2;color:#1a1a1a;">
                {header}
            </h5>
        </f:case>
        <f:case value="6">
            <h6 style="margin:0 0 12px 0;font-family:Arial,Helvetica,sans-serif;font-size:14px;font-weight:700;line-height:1.2;color:#1a1a1a;">
                {header}
            </h6>
        </f:case>
        <f:case value="100">
            <f:comment> -- do not show header -- </f:comment>
        </f:case>
        <f:defaultCase>
            <p style="margin:0 0 12px 0;font-family:Arial,Helvetica,sans-serif;font-size:26px;font-weight:700;line-height:1.2;color:#1a1a1a;">
                {header}
            </p>
        </f:defaultCase>
    </f:switch>
</f:if>
</html>
