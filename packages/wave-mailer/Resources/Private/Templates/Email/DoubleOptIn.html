<f:layout name="SystemEmail" />

<f:section name="Subject">
	<f:translate key="doubleOptInEmail.subject"></f:translate>
</f:section>

<f:section name="Main">
	<f:if condition="{subscriber.firstName}">
		<f:then>
			<p>Hello {subscriber.firstName}!</p>
		</f:then>
		<f:else>Hello!</f:else>
	</f:if>

	<p>Thank you for subscribing to our newsletter.</p>

	<p>Please confirm your subscription by clicking the link below:</p>

	<p><f:link.action pluginName="DoubleOptIn" pageUid="{settings.doubleOptInPage}" controller="DoubleOptIn" action="confirm" arguments="{hash: subscriber.doubleOptInToken}">Confirm Subscription</f:link.action></p>
	<p>If you did not request this subscription, you can safely ignore this email.</p>

	<p>Best regards</p>
</f:section>
