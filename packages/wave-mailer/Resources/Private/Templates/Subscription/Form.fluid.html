<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">


<f:layout name="Content/Default"/>

<f:section name="Main">
	<f:if condition="{settings.includeCSS}">
		<f:asset.css identifier="wavemailer" href="EXT:wave_mailer/Resources/Public/SCSS/styles.css"/>
	</f:if>

	<div class="tx_wavemailer">
		<f:form action="subscribe" method="post" objectName="newSubscriber" object="{newSubscriber}">
			<div class="subscription-form-fieldwrap">
				<fieldset>
					<label for="email"><f:translate key="LLL:EXT:wave_mailer/Resources/Private/Language/locallang.xlf:subscription.form.label.email"/>*</label>
					<f:form.textfield type="email" property="email" id="email" required="required"></f:form.textfield>
					<f:render partial="FormError" arguments="{property: 'newSubscriber.email'}"/>
				</fieldset>
			</div>

			<div class="subscription-form-fieldwrap">
				<fieldset>
					<label for="firstname"><f:translate key="LLL:EXT:wave_mailer/Resources/Private/Language/locallang.xlf:subscription.form.label.firstName"/></label>
					<f:form.textfield type="text" property="firstName" id="firstname"></f:form.textfield>
				</fieldset>
			</div>

			<div class="subscription-form-fieldwrap">
				<fieldset>
					<label for="lastname"><f:translate key="LLL:EXT:wave_mailer/Resources/Private/Language/locallang.xlf:subscription.form.label.lastName"/></label>
					<f:form.textfield type="text" property="lastName" id="lastname"></f:form.textfield>
				</fieldset>
			</div>

			<div class="subscription-form-fieldwrap">
				<fieldset>
					<f:for each="{subscriptionGroups}" as="subscriptionGroup" iteration="i">
						<div>
							<f:form.checkbox multiple="1" property="subscriptionGroups" id="subscriptionGroup{i.cycle}" value="{subscriptionGroup.uid}" />
							<label for="subscriptionGroup{i.cycle}">{subscriptionGroup.name}</label>
						</div>
					</f:for>
				</fieldset>
			</div>

			<f:form.submit value="{f:translate(key: 'LLL:EXT:wave_mailer/Resources/Private/Language/locallang.xlf:subscription.form.button.submit')}"/>
		</f:form>
	</div>
</f:section>
</html>
